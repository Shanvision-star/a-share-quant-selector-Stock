# ============================================
# A股量化选股系统 - 策略参数配置
# ============================================
# 
# 修改此文件后，策略会在下次运行时自动加载新参数
# 无需重启程序

# ============================================
# 碗口反弹策略 (BowlReboundStrategy)
# ============================================
# 策略逻辑：
# 1. 股票处于上升趋势（短期趋势线在多空线之上）
# 2. 价格回落至趋势线附近（碗中或短期趋势线附近）
# 3. 近期有过放量阳线（异动）
# 4. KDJ指标处于低位（J <= J_VAL）

BowlReboundStrategy:
  # N: 成交量倍数
  # 关键K线的成交量需 >= 前一日成交量 * N
  # 建议值: 3-5
  N: 2
  
  # M: 回溯天数
  # 在M天内是否存在关键K线
  # 建议值: 10-20
  M: 30
  
  # CAP: 总市值门槛（单位：元）
  # 只选择总市值大于此值的股票
  # 默认 40亿 = 4000000000
  # 建议值: 2000000000 (20亿) 到 100000000000 (1000亿)
  CAP: 4000000000
  
  # J_VAL: J值上限
  # KDJ指标的J值需 <= J_VAL 才符合买入条件
  # 建议值: 20-30 (低位买入)
  # 注意: J值越小表示越超卖，但可能错过一些反弹机会
  J_VAL: 20
  
  # M1-M4: 知行多空线计算用的MA周期
  # 知行多空线 = MA(CLOSE,M1)+MA(CLOSE,M2)+MA(CLOSE,M3)+MA(CLOSE,M4))/4
  # 默认使用 5,10,20,30 日均线组合
  M1: 14
  M2: 28
  M3: 57
  M4: 114
  
  # duokong_pct: 靠近多空线百分比
  # 价格距离知行多空线 ±duokong_pct% 范围内判定为"靠近多空线"
  # 建议值: 2-5
  duokong_pct: 0.87
  
  # short_pct: 靠近短期趋势线百分比
  # 价格距离知行短期趋势线 ±short_pct% 范围内判定为"靠近短期趋势线"
  # 建议值: 1-3
  short_pct: 1

# ============================================
# B1阶段型预警策略 (B1CaseStrategy)
# ============================================
# 策略逻辑：
# 1. 在历史窗口内寻找最近一次低位 KDJ 触发（anchor）
# 2. anchor 后连续若干天不破触发日开盘价，确认护盘
# 3. 中段需要出现一段大阳拉升，并形成连续走强
# 4. 洗盘阶段不能有效跌破前期参考支撑
# 5. 当前仍处于再次回踩知行多空线的 setup 窗口
# 6. 阶段1-5通过即纳入 run 默认选股结果，等待大阳买点确认

B1CaseStrategy: &b1_case_strategy_params
  # lookback_days: 前瞻扫描回看窗口
  # 默认 80 天，覆盖一个完整的低位触发→拉升→洗盘→再回踩周期
  lookback_days: 80

  # setup_window_days: setup 观察窗口天数
  # 当前窗口内至少 N-1 天满足“低 J + 靠近多空线”
  setup_window_days: 2

  # anchor_kdj_max: 低位触发日 J 值上限
  anchor_kdj_max: 20

  # no_break_days: 护盘天数
  no_break_days: 3

  # breakout_min_pct: 大阳突破最小涨幅（相对开盘价）
  breakout_min_pct: 4.0

  # breakout_min_streak: 突破后最少连续走强天数
  breakout_min_streak: 3

  # revisit_kdj_max: 当前 setup 窗口 J 值上限
  revisit_kdj_max: 20.0

  # revisit_band_pct: 当前收盘价距离知行多空线允许偏离区间
  revisit_band_pct: 3.0

  # 知行双线参数，保持与 BowlReboundStrategy 统一
  duokong_pct: 3.0
  short_pct: 2.0
  M1: 14
  M2: 28
  M3: 57
  M4: 114

# 兼容旧名称，避免已有脚本读取不到参数
B1CaseAnalyzer:
  <<: *b1_case_strategy_params

# ============================================
# B1完美图形匹配 (B1PatternMatch)
# ============================================
# 功能说明：
# 将选股结果与12个历史成功案例进行四维相似度匹配
# 按相似度排序输出，帮助识别具有相似突破特征的股票
#
# 详细逻辑请参考: B1_PATTERN_MATCH.md

B1PatternMatch:
  # min_similarity: 最小相似度阈值
  # 只显示相似度 >= 此值的股票
  # 建议值: 50-70
  # - 50%: 宽松，显示更多候选
  # - 60%: 适中，平衡质量与数量
  # - 70%: 严格，只显示高度相似
  min_similarity: 60
  
  # lookback_days: 回看天数
  # 匹配时使用最近多少天的数据进行比较
  # 建议值: 15-40
  # - 15天: 短线整理（1-2周）
  # - 25天: 中线整理（3-4周）- 默认
  # - 40天: 长线整理（1-2月）
  lookback_days: 25
  
  # weights: 四维相似度权重
  # 四个维度的权重分配，总和应为1.0
  weights:
    trend_structure: 0.10   # 双线结构：短期/多空趋势线相对位置
    kdj_state: 0.20         # KDJ状态：J值位置、金叉状态
    volume_pattern: 0.25    # 量能特征：成交量变化模式
    price_shape: 0.45       # 价格形态：归一化曲线DTW匹配
  
  # tolerances: 匹配容差参数
  # 各项特征的容忍差异范围，越小越严格
  tolerances:
    trend_ratio: 0.10       # 趋势比值容差（±10%）
    price_bias: 10          # 价格偏离容差（±10%）
    trend_spread: 10        # 趋势发散容差（±10%）
    j_value: 30             # J值差异容差（±30）
    drawdown: 15            # 回撤幅度容差（±15%）
  
  top_n_results: 25         # 展示Top N个匹配结果（钉钉通知中显示的数量）

  # auto_fallback_to_classic: B1阶段出现异常时自动切换到原始选股模式（仅发基础选股结果）
  auto_fallback_to_classic: true

  # max_candidates: B1匹配最大候选数（先按J值低位优先后裁剪）
  # 候选过多会显著增加CPU和内存压力，建议200-600
  max_candidates: 400

  # match_workers: B1匹配线程数，0表示自动
  # 自动模式下会根据CPU核心数估算线程数；若设备只有单核，则自动降级为单线程
  match_workers: 0

  # prefilter_by_j: 裁剪候选前按J值升序预筛（更偏向低位形态，能提速）
  prefilter_by_j: true

# ============================================
# B2 三分类策略 (B2Strategy)
# ============================================
# 功能说明：
# 1. 横盘突破型：标准平台整理后放量突破
# 2. 灾后重建型：前期大幅破坏后，放量反转并进入修复平台，再次突破
# 3. 平行重炮型：多根相近价位的大阳反复攻击，形成缩量中继后再启动

B2Strategy:
  # B1 / B2 共用基础条件
  b1_kdj_threshold: 13
  b1_close_near_pct: 2.0
  b1_pre_lookback: 20
  b1_big_up_pct: 5.0
  b1_big_up_days_min: 3
  b1_big_up_days_max: 5
  b1_turnover_sum_pct: 35.0
  vol_mean_days: 10
  vol_multiplier: 1.5
  b2_min_pct: 4.0
  b2_hold_days: 3

  # 灾后重建型参数
  damage_lookback_days: 50
  damage_min_drop_pct: 18.0
  reversal_min_pct: 6.0
  reversal_vol_multiplier: 1.8
  rebuild_window_days: 12

  # 平行重炮型参数
  parallel_lookback_days: 25
  parallel_big_up_pct: 4.0
  parallel_big_up_min_count: 2
  parallel_big_up_max_count: 4
  parallel_close_band_pct: 2.0
  red_fat_green_vol_ratio: 0.65
  b1_to_b2_transition_days: 15

  # 导出目录
  export_txt_dir: data/txt/B2-match

